name: galaxyair
channels:
  - pytorch
  - dglteam
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pytorch>=2.0.0
  - torchvision
  - torchaudio
  - cudatoolkit=11.8          # adjust to your CUDA version
  - dgl>=1.1.0
  - pip
  - pip:
    - dgllife>=0.3.2
    - rdkit>=2022.9.1
    - scikit-learn>=1.2.0
    - imbalanced-learn>=0.10.0
    - numpy>=1.24.0
    - pandas>=1.5.0
    - matplotlib>=3.6.0
    - tqdm>=4.64.0
    - pyyaml>=6.0
    - biopython>=1.80
    - networkx>=3.0
    - openpyxl>=3.1.0
    - wandb>=0.15.0            # optional: experiment tracking
